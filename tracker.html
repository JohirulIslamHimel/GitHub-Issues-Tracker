<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker</title>

    <!-- font awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- font integration -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- tailwind & daisyUI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- style sheet -->
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body class="bg-gray-50 min-h-screen">
    <nav
      class="bg-white border-b border-gray-200 py-3 px-10 flex justify-between items-center sticky top-0 z-50"
    >
      <div class="flex items-center gap-2">
        <img
          src="./assets/github-logo.png"
          alt="github-logo"
          class="w-10 h-10 object-contain"
        />
        <span class="text-xl font-bold text-slate-800"
          >GitHub Issues Tracker</span
        >
      </div>
      <!-- search bar -->
      <div class="flex items-center gap-4">
        <div class="join">
          
            <label
              class="input input-bordered join-item flex items-center gap-2 bg-gray-50 h-10 border-r-0"
            >
              <i onclick="handleSearch()"  class="fa-solid fa-magnifying-glass text-gray-400 text-sm cursor-pointer hover:text-indigo-600 transition-colors"></i>
              <input
                type="text"
                id="searchInput"
                class="grow border-none focus:ring-0 text-sm"
                placeholder="Search issues..."
                required
              />
            </label>
            
          <button class="btn btn-primary join-item h-10 min-h-0 bg-indigo-600 border-none text-white px-6 font-semibold">+ New Issue</button>
        
      </div>
    </nav>

    <main class="max-w-7xl mx-auto  p-6 space-y-6">
        <!--all open close section  -->
        <div class="bg-white p-2 rounded-lg border border-gray-100 shadow-md w-full">
            
            <div  class="flex gap-4">
            <button onclick="filterIssues('all', event)" id="all-btn" class="filter-btn btn bg-blue-600 text-white px-10 rounded-lg border border-gray-500">All</button>
            <button onclick="filterIssues('open', event)" id="open-btn" class="filter-btn btn px-10 rounded-lg bg-gray-200 text-gray-700 border border-gray-500">Open</button>
            <button onclick="filterIssues('closed', event)" id="closed-btn" class="filter-btn btn px-10 rounded-lg bg-gray-200 text-gray-700 border border-gray-500 ">Close</button>
            </div>
            </div>


            <!-- Issues -->
             <div class="bg-white border border-gray-100 rounded-2xl p-6 shadow-md flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <div class="bg-indigo-50 p-3 rounded-full">
                        <img src="./assets/Aperture.png" alt="Aperture" class="w-8 h-8">
                    </div>
                    <div class="">
                        <h1 class="text-2xl font-semibold text-slate-800"><span id="total-count">50</span> Issues</h1>
                        <p class="text-[#64748B] text-sm font-medium">Track and manage your project issues</p>
                    </div>
                </div>

                <div class="flex gap-5">
                    <div class="flex items-center gap-2">
                        <span class="w-3 h-3 bg-emerald-700 rounded-full"></span>
                        <span class="text-lg font-medium ">Open</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="w-3 h-3 bg-purple-700 rounded-full"></span>
                        <span class="text-lg font-medium ">Closed</span>
                    </div>
                </div>
             </div>
             <!-- <img src="./assets/Closed- Status .png" alt=""> -->

             
             <!-- loading spinner -->
              <div id="loading-spinner" class="flex justify-center items-center py-10">
                <span class="loading loading-spinner loading-sm"></span>
              </div>

              <!-- issues list -->
               <div id="issues-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5 py-5"></div>

               <!-- modal -->
                <section id="modal-section">
  <dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
    <div class="modal-box max-w-lg p-4 sm:p-8">
      <div class="flex justify-between items-start mb-4">
        <h3 id="modalTitle" class="text-xl sm:text-2xl font-bold text-slate-800 leading-tight"></h3>
        
      </div>
      
      <div class="flex items-center gap-2 text-sm text-gray-400 mb-6">
        <span id="modalStatus" class="px-3 py-1 bg-green-100 text-green-500 rounded-full font-medium text-xs"></span>
        <span>•</span>
        <span>Opened by <span id="modalAuthor" class="font-bold text-gray-600"></span></span>
        <span>•</span>
        <span id="modalDate"></span>
      </div>

      <div id="modalLabels" class="flex flex-wrap gap-2 mb-6">
        </div>

      <div class="mb-8">
        <p id="modalDescription" class="text-gray-500 text-base leading-relaxed"></p>
      </div>

      <div class="bg-gray-50/80 p-4 rounded-2xl flex justify-between items-center mb-6">
        <div class="space-y-0.5">
          <p class="text-[9px] sm:text-[11px] text-gray-400 uppercase font-bold">Assignee:</p>
          <p id="modalAssignee" class="text-slate-800 font-bold text-base sm:text-lg"></p>
        </div>
        <div class="text-right space-y-1">
          <p class="text-[11px] text-gray-400 uppercase tracking-wider font-bold">Priority:</p>
          <span id="modalPriority" class="px-4 py-1.5 rounded-full text-white font-black text-xs uppercase shadow-sm shadow-red-200"></span>
        </div>
      </div>

      <div class="flex justify-end">
        <form method="dialog">
          <button class="btn bg-indigo-600 hover:bg-indigo-700 text-white border-none px-10 rounded-xl h-12">Close</button>
        </form>
      </div>
    </div>
  </dialog>
</section>
        
    </main>
    <!-- js for tracker -->
    <script src="./script.js"></script>
  </body>
</html>
