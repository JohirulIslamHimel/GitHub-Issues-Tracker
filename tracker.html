<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker</title>

    <!-- font awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- font integration -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- tailwind & daisyUI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- style sheet -->
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body class="bg-gray-50 min-h-screen">
    <nav
      class="bg-white border-b border-gray-200 py-3 px-10 flex justify-between items-center sticky top-0 z-50"
    >
      <div class="flex items-center gap-2">
        <img
          src="./assets/github-logo.png"
          alt="github-logo"
          class="w-10 h-10 object-contain"
        />
        <span class="text-xl font-bold text-slate-800"
          >GitHub Issues Tracker</span
        >
      </div>
      <!-- search bar -->
      <div class="flex items-center gap-4">
        <div class="join">
          
            <label
              class="input input-bordered join-item flex items-center gap-2 bg-gray-50 h-10 border-r-0"
            >
              <i class="fa-solid fa-magnifying-glass text-gray-400 text-sm"></i>
              <input
                type="text"
                id="searchInput"
                class="grow border-none focus:ring-0 text-sm"
                placeholder="Search issues..."
                required
              />
            </label>
            
          <button class="btn btn-primary join-item h-10 min-h-0 bg-indigo-600 border-none text-white px-6 font-semibold">+ New Issue</button>
        
      </div>
    </nav>
    <!-- js for tracker -->
    <script src="./script.js"></script>
  </body>
</html>
