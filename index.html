<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker</title>

    <!-- font awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- font integration -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- tailwind & daisyUI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- style sheet -->
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body class="bg-gray-50 flex items-center justify-center min-h-screen">
    <main
      class="w-full max-w-md p-6 bg-white rounded-2xl shadow-xl border border-blue-100"
    >
      <!-- login header -->
      <div class="text-center mb-8">
        <div class="flex justify-center mb-4">
          <img src="./assets/github-logo.png" alt="github logo" />
        </div>
        <h1 class="text-3xl font-bold text-slate-800">GitHub Issues Tracker</h1>
        <p class="text-gray-500 mt-2">Sign in to manage your issues</p>
      </div>

      <!-- login form -->
      <fieldset
        id="loginForm"
        class="fieldset bg-base-200 border-base-300 rounded-2xl shadow-xl border p-6 space-y-4"
      >
        <div class="form-control w-full">
          <label class="label font-semibold text-slate-800">Username</label>
          <input
            type="text"
            id="username"
            class="input input-bordered w-full"
            placeholder="Enter Username"
          />
          <p class="text-[10px] text-blue-600 mt-1">Default: admin</p>
        </div>
        <div class="form-control w-full">
          <label class="label font-semibold text-slate-800">Password</label>
          <input
            type="password"
            id="password"
            class="input input-bordered w-full"
            placeholder="Enter Password"
          />
          <p class="text-[10px] text-blue-600 mt-1">Default: admin123</p>
        </div>

        <button onclick="handleLogin()" class="btn btn-primary w-full mt-4">
          Sign In
        </button>

        <!-- login footer -->
        <div class="divider">OR</div>

        <div class="text-center text-sm">
          <p class="text-gray-400 mb-2 font-semibold">Demo Credentials:</p>
          <p class="text-slate-700 font-bold">
            Username: <span class="font-normal">admin</span>
          </p>
          <p class="text-slate-700 font-semibold">
            Password: <span class="font-normal"> admin123</span>
          </p>
        </div>
      </fieldset>
    </main>

    <!-- js -->
    <script src="./login.js"></script>
  </body>
</html>
